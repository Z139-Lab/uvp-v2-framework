source_type: grid
input_path: data/raw/grid/summary_results.csv
output_dir: results/grid_main16

columns:
  stress: stress
  L: L
  phi: phi_mean
  collapse_prob: chi
  n_seeds: n_runs

critical_detection:
  method: composite_scan
  band_half_width_points: 1

z_fit:
  method: auto
  z_min: 0.8
  z_max: 2.2
  z_steps: 120
  stress_window_fraction: 0.15

plotting:
  enabled: true

relaxation:
  enabled: false
