source_type: llm
input_path: data/raw/llm/summary.csv
output_dir: results/llm_run_001

columns:
  stress: stress
  L: L
  collapse_prob: collapse_prob
  phi: phi
  tau: tau
  n_seeds: n_seeds

critical_detection:
  method: heuristic_scan
  band_half_width_points: 1

z_fit:
  method: auto
  z_min: 0.5
  z_max: 2.5
  z_steps: 101
  stress_window_fraction: 0.15

plotting:
  enabled: true

relaxation:
  enabled: false
